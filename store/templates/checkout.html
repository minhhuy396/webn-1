{% extends "base.html" %}

{% block content %}

<style>

.container{
    max-width:900px;
    margin:auto;
    padding:50px 20px;
}

.checkout-card{
    background:white;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    animation:fadeUp 0.8s ease;
}

h2{
    margin-bottom:25px;
    color:#2e8b57;
}

/* form */

form{
    display:grid;
    gap:15px;
}

input,textarea{
    padding:12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
    transition:0.3s;
}

input:focus,textarea:focus{
    border-color:#2e8b57;
    outline:none;
    box-shadow:0 0 5px rgba(46,139,87,0.4);
}

/* button */

button{
    padding:12px;
    background:#2e8b57;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#256f47;
    transform:scale(1.03);
}

/* đơn hàng */

.order{
    margin-top:35px;
    padding-top:20px;
    border-top:1px solid #eee;
}

.order h3{
    margin-bottom:15px;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    border-bottom:1px solid #f0f0f0;
}

/* animation */

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

<div class="container">

<div class="checkout-card">

<h2>📦 Thanh toán đơn hàng</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="name" placeholder="Họ và tên" required>

<input type="text" name="phone" placeholder="Số điện thoại" required>

<textarea name="address" placeholder="Địa chỉ giao hàng" rows="3" required></textarea>

<button type="submit">
Đặt hàng
</button>

</form>


<div class="order">

<h3>🛒 Sản phẩm trong đơn</h3>

{% for item in cart.cartitem_set.all %}

<div class="item">
<span>
{{ item.product.name }} (x{{ item.quantity }})
</span>

<span>
{{ item.product.price }} đ
</span>
</div>

{% endfor %}

</div>

</div>

</div>

{% endblock %}
