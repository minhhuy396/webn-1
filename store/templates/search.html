{% extends "base.html" %}
{% load static %}

{% block content %}

<style>
.products{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.product{
    background:white;
    border:1px solid #ddd;
    border-radius:10px;
    padding:15px;
    text-align:center;
    transition:0.3s;
}

.product:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
}

.product img{
    width:100%;
    height:170px;
    object-fit:cover;
    border-radius:6px;
}

.price{
    color:#e74c3c;
    font-weight:bold;
    margin:10px 0;
}
</style>

<h2 class="section-title">Kết Quả Tìm Kiếm: "{{ keyword }}"</h2>

{% if products %}
<div class="products">

    {% for product in products %}
    <div class="product">

        <a href="{% url 'product_detail' product.id %}">
            <img src="{{ product.image.url }}">
        </a>

        <h4>{{ product.name }}</h4>

        <p class="price">{{ product.price }} đ</p>

        <a class="btn" href="{% url 'product_detail' product.id %}">
            Xem chi tiết
        </a>

    </div>
    {% endfor %}

</div>

{% else %}
<p>Không tìm thấy sản phẩm nào.</p>
{% endif %}

{% endblock %}
