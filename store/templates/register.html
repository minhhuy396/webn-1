{% extends "base.html" %}

{% block content %}

<style>

.auth-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:80vh;
}

.auth-box{
    width:380px;
    background:white;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
    animation:fadeUp 0.8s ease;
}

.auth-box h2{
    margin-bottom:25px;
    color:#2e8b57;
}

/* input */

.auth-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:15px;
    transition:0.3s;
}

.auth-box input:focus{
    border-color:#2e8b57;
    outline:none;
    box-shadow:0 0 5px rgba(46,139,87,0.4);
}

/* button */

.auth-box button{
    width:100%;
    padding:12px;
    background:#2e8b57;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:16px;
    margin-top:10px;
    transition:0.3s;
}

.auth-box button:hover{
    background:#256d46;
    transform:scale(1.03);
}

/* link */

.auth-box a{
    display:block;
    margin-top:18px;
    text-decoration:none;
    color:#2e8b57;
    font-weight:bold;
}

.auth-box a:hover{
    text-decoration:underline;
}

/* animation */

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

<div class="auth-container">

<div class="auth-box">

<h2>📝 Đăng ký tài khoản</h2>

<form method="POST">
{% csrf_token %}

<input type="text" name="username" placeholder="Tên tài khoản" required>

<input type="password" name="password" placeholder="Mật khẩu" required>

<input type="password" name="confirm_password" placeholder="Nhập lại mật khẩu" required>

<button type="submit">
Đăng ký
</button>

</form>

<a href="{% url 'login' %}">
Đã có tài khoản? Đăng nhập
</a>

</div>

</div>

{% endblock %}
