{% extends "base.html" %}

{% block content %}

<style>

.success-container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:70vh;
}

.success-box{
    background:white;
    padding:50px;
    width:420px;
    text-align:center;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    animation:fadeUp 0.8s ease;
}

.success-box h2{
    color:#2e8b57;
    margin-bottom:15px;
}

.success-box p{
    font-size:17px;
    color:#555;
}

/* button */

.success-box a{
    display:inline-block;
    margin-top:25px;
    padding:12px 25px;
    background:#2e8b57;
    color:white;
    text-decoration:none;
    border-radius:6px;
    transition:0.3s;
}

.success-box a:hover{
    background:#256d46;
    transform:scale(1.05);
}

/* animation */

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(25px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

<div class="success-container">

<div class="success-box">

<h2>🎉 Đặt hàng thành công</h2>

<p>Cảm ơn bạn đã mua hàng tại <b>Shop Dừa Bến Tre</b>.</p>

<p>Chúng tôi sẽ sớm liên hệ để xác nhận đơn hàng.</p>

<a href="/">
🏠 Quay lại trang chủ
</a>

</div>

</div>

{% endblock %}
